name: Deploy to cPanel

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy and Migrate
    runs-on: ubuntu-latest

    steps:
    - name: ⬇ Checkout Repository
      uses: actions/checkout@v3

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: 📦 Install Node dependencies
      run: npm install

    - name: 🛠️ Build frontend assets
      run: npm run build

    - name: 📦 Deploy to FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: 192.250.229.30
        username: ftpgithub@safedatait.com
        password: fXIV}m2Ws&Z0ofbI

    - name: ⏳ Wait for files to sync
      run: sleep 20

    - name: 🔧 Run Migrations via Direct IP
      run: |
        echo "Running migrations (bypassing Cloudflare)..."
        response=$(curl -X POST http://192.250.229.30/api/deploy/migrate \
          -H "Host: safedatait.com" \
          -H "X-Deploy-Token: 7k9mP2vL8nQ4wR6xT3yU1zB5cD0eF7gH9jK2mN4pQ6sT8vW0xY3zA5bC7dE9fG1h" \
          -w "\n%{http_code}" \
          --max-time 300 \
          --retry 3 \
          --retry-delay 5 \
          -s)
        
        http_code=$(echo "$response" | tail -n1)
        body=$(echo "$response" | sed '$d')
        
        echo "Response Body: $body"
        echo "HTTP Code: $http_code"
        
        if [ "$http_code" = "200" ]; then
          echo "✅ Migration completed successfully"
        else
          echo "❌ Migration failed with HTTP code $http_code"
          echo "Response: $body"
          exit 1
        fi

    - name: 🎉 Deployment Complete
      run: echo "Deployment and migration completed successfully!"